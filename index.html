<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for FAA</title>
    <style>
        body { 
            background: #fdf2f8; 
            color: #4a4a4a; 
            font-family: 'Georgia', serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .letter { 
            background: white; 
            padding: 40px; 
            width: 85%; max-width: 400px; 
            border-radius: 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #ffe4e6;
        }
        h1 { color: #db2777; font-size: 1.5rem; }
        .hidden { display: none; }
        button { 
            background: #db2777; color: white; border: none; 
            padding: 12px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="letter" id="page1">
        <h1>To: FAA</h1>
        <p>I have a little something for you...</p>
        <button onclick="show()">Open Letter</button>
    </div>

    <div class="letter hidden" id="page2">
        <p>Happy 17th Birthday, FAA!</p>
        <p>I hope your day is as special as you are to me.</p>
        <p>Thank you for everything.</p>
    </div>

    <script>
        function show() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }
    </script>
</body>
</html>
